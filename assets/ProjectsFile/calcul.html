  <head>
    <meta charset="UTF-8" />

    <title>Document</title>
    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      hr {
        margin: 0.8rem 0;
      }
      input {
        outline: none;
        width: 100%;
        padding: 0.3rem 0;
      }
      button {
        /* width: 50px; */
        display: flex;
        justify-content: center;
        cursor: pointer;
      }

      button:nth-child(17) {
        grid-column: -1/-5;
      }
      .container {
        background-color: #464242;
        padding: 2rem;
        width: 50%;
        border-radius: 2px;
      }

      .num-Box {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        grid: 1;
      }
      .num-Box button {
        padding: 1rem;
        font-size: 1.2rem;
      }
    </style>
  </head>
  <body>
    <div id="container" class="container">
      <input type="text" class="result-Box" id="result-Box" />
      <hr />
      <div id="num-Box" class="num-Box"></div>
    </div>
    
    <script>
      const input = document.querySelector("input");
      const buttons = document.getElementById("num-Box");

      let elem = [
        "1",
        "2",
        "3",
        "+",
        "4",
        "5",
        "6",
        "-",
        "7",
        "8",
        "9",
        "*",
        "C",
        "0",
        "BS",
        "/",
        "=",
      ];

      elem.forEach((element) => {
        const btn = document.createElement("button");
        btn.textContent = element;
        buttons.appendChild(btn);
      });

      buttons.addEventListener("click", function (e) {
        if (e.target.tagName === "BUTTON") {
          const value = e.target.textContent;
          const lastChar = input.value.slice(-1);

          if (
            value === "+" ||
            value === "-" ||
            value === "*" ||
            value === "/"
          ) {
            if (input.value === "") {
              if (value === "-") {
                input.value += value;
              }
              return;
            }

            if (
              lastChar === "+" ||
              lastChar === "-" ||
              lastChar === "*" ||
              lastChar === "/"
            ) {
              return;
            }
            input.value += value;
          } else if (value === "=") {
            try {
              const result = Function("return " + input.value)();
              input.value = result;
            } catch {
              input.value = "خطا";
            }
          } else if (value === "BS") {
            input.value = input.value.slice(0, -1);
          } else if (value === "C") {
            input.value = "";
          } else {
            input.value += value;
          }
        }
      });
